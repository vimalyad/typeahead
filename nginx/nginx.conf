server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Read path (suggestions, trending, cache debug) -> suggestion-service.
    location /api/suggest   { proxy_pass http://suggestion-service:8081; proxy_set_header Host $host; }
    location /api/trending  { proxy_pass http://suggestion-service:8081; proxy_set_header Host $host; }
    location /api/cache     { proxy_pass http://suggestion-service:8081; proxy_set_header Host $host; }

    # Write path (search submission) -> ingestion-service.
    location /api/search    { proxy_pass http://ingestion-service:8082;  proxy_set_header Host $host; }

    # Static assets get a long cache; the hashed filenames make them safe to keep.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: anything else serves the app shell.
    location / {
        try_files $uri /index.html;
    }
}
